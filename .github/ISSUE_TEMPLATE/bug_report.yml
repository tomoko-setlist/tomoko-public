name: 不具合報告
description: 表示や動作の不具合を報告する
title: "[不具合]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きたか、分かる範囲で書いてください。
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 操作手順、検索条件、開いたページなど、分かる範囲で書いてください。
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: textarea
    id: expected
    attributes:
      label: 期待した結果
      description: 本来どう表示・動作してほしいか、分かれば書いてください。
  - type: textarea
    id: actual
    attributes:
      label: 実際の結果
      description: 実際に表示された内容やエラーメッセージを書いてください。
  - type: input
    id: page
    attributes:
      label: ページ URL
      description: 問題が起きたページの URL があれば貼ってください。
  - type: textarea
    id: environment
    attributes:
      label: 利用環境
      description: ブラウザ、端末、OS など、分かる範囲で書いてください。
      placeholder: "例: Chrome / iPhone / Safari など"
  - type: textarea
    id: extra
    attributes:
      label: 補足
      description: スクリーンショットや追加情報があれば書いてください。
