name: 機能追加・改善提案
description: 新機能の追加や既存機能の改善を提案する
title: "[提案]: "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 追加・改善したい内容を、分かる範囲で書いてください。
  - type: textarea
    id: use_case
    attributes:
      label: 使い道
      description: どの画面、検索、データ確認で使いたいか、分かれば書いてください。
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: どのように動いてほしいか、どのように表示してほしいか、分かれば書いてください。
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に考えた方法や、現状の回避方法があれば書いてください。
  - type: textarea
    id: extra
    attributes:
      label: 補足
      description: 参考 URL、スクリーンショット、関連 Issue などがあれば書いてください。
